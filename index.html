      /* CSS Crítico Mínimo - Above the Fold - Otimizado para Performance */
      *{margin:0;padding:0;box-sizing:border-box}

      .h-full{height:100%}
      .object-cover{object-fit:cover;object-position:center}
      .rounded-2xl{border-radius:1rem}
      .overflow-hidden{overflow:hidden}

      img,video{max-width:100%;height:auto;display:block}
      /* ✅ OTIMIZAÇÃO CLS: Preservar espaço de imagens críticas */

      /* Header crítico */

    <!-- ✅ OTIMIZAÇÃO: CSS carregado de forma não-bloqueante (defer total) -->
    <link rel="preload" href="/src/index.css" as="style" />
    <link rel="stylesheet" href="/src/index.css" media="print" onload="this.media='all';this.onload=null" />
    <noscript><link rel="stylesheet" href="/src/index.css" /></noscript>
    <script>
      // Fallback otimizado - timeout reduzido para 25ms
      (function() {
        var link = document.querySelector('link[href="/src/index.css"]');
        if (link && link.media === 'print') {
          var fallback = setTimeout(function() {
            if (link.media === 'print') {
              link.media = 'all';
            }
          }, 25);
          if (link.onload) {
            var originalOnload = link.onload;
            link.onload = function() {
              clearTimeout(fallback);
              if (originalOnload) originalOnload.call(this);
              this.onload = null;
            };
          }
        }
      })();
    </script>

    <!-- ✅ OTIMIZAÇÃO PERFORMANCE: Scripts de terceiros carregados apenas após paint completo e idle -->
    <script>
      // ✅ OTIMIZAÇÃO: Deferir scripts de terceiros até após paint e idle time
      const loadThirdPartyScripts = function() {
        // Aguardar paint completo
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            // Aguardar múltiplos frames para garantir paint completo
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                // Aguardar idle time antes de carregar scripts não críticos
                if ('requestIdleCallback' in window) {
                  window.requestIdleCallback(function() {
                    // UTMify
                    var utmify = document.createElement('script');
                    utmify.src = 'https://cdn.utmify.com.br/scripts/utms/latest.js';
                    utmify.setAttribute('data-utmify-prevent-subids', '');
                    utmify.async = true;
                    document.body.appendChild(utmify);
                    
                    // UTMify Loader
                    var utmifyLoader = document.createElement('script');
                    utmifyLoader.src = '/utmify-loader.js';
                    utmifyLoader.async = true;
                    document.body.appendChild(utmifyLoader);
                  }, { timeout: 2000 });
                } else {
                  setTimeout(function() {
                    var utmify = document.createElement('script');
                    utmify.src = 'https://cdn.utmify.com.br/scripts/utms/latest.js';
                    utmify.setAttribute('data-utmify-prevent-subids', '');
                    utmify.async = true;
                    document.body.appendChild(utmify);
                    
                    var utmifyLoader = document.createElement('script');
                    utmifyLoader.src = '/utmify-loader.js';
                    utmifyLoader.async = true;
                    document.body.appendChild(utmifyLoader);
                  }, 2000);
                }
              });
            });
          });
        } else {
          // DOM já está pronto
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              if ('requestIdleCallback' in window) {
                window.requestIdleCallback(function() {
                  var utmify = document.createElement('script');
                  utmify.src = 'https://cdn.utmify.com.br/scripts/utms/latest.js';
                  utmify.setAttribute('data-utmify-prevent-subids', '');
                  utmify.async = true;
                  document.body.appendChild(utmify);
                  
                  var utmifyLoader = document.createElement('script');
                  utmifyLoader.src = '/utmify-loader.js';
                  utmifyLoader.async = true;
                  document.body.appendChild(utmifyLoader);
                }, { timeout: 2000 });
              } else {
                setTimeout(function() {
                  var utmify = document.createElement('script');
                  utmify.src = 'https://cdn.utmify.com.br/scripts/utms/latest.js';
                  utmify.setAttribute('data-utmify-prevent-subids', '');
                  utmify.async = true;
                  document.body.appendChild(utmify);
                  
                  var utmifyLoader = document.createElement('script');
                  utmifyLoader.src = '/utmify-loader.js';
                  utmifyLoader.async = true;
                  document.body.appendChild(utmifyLoader);
                }, 2000);
              }
            });
          });
        }
      };
      loadThirdPartyScripts();
    </script>
